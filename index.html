<!doctype html>
<html lang="ms" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portal Digital SERASHA — satu portal untuk semua eSistem SMK Raja Shahriman, Beruas, Perak."
    />
    <meta name="theme-color" content="#070b18" />
    <link rel="icon" href="/brand/smkrs-crest.jpg" />
    <title>Portal Digital SERASHA · SMK Raja Shahriman</title>
    <script>
      // Tetapkan tema sebelum lukisan pertama untuk mengelakkan kelipan.
      ;(function () {
        var themes = ['night', 'dawn', 'day', 'dusk']
        var pref
        try {
          pref = new URLSearchParams(window.location.search).get('theme')
        } catch (error) {
          pref = null
        }
        if (themes.indexOf(pref) < 0 && pref !== 'auto') {
          try {
            pref = localStorage.getItem('serasha-theme')
          } catch (error) {
            pref = null
          }
        }
        var theme = pref
        if (themes.indexOf(theme) < 0) {
          var now = new Date()
          var minutes = now.getHours() * 60 + now.getMinutes()
          if (minutes >= 360 && minutes < 540) theme = 'dawn'
          else if (minutes >= 540 && minutes < 1020) theme = 'day'
          else if (minutes >= 1020 && minutes < 1170) theme = 'dusk'
          else theme = 'night'
        }
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
